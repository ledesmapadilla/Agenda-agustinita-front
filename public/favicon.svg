<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- fondo redondeado -->
  <rect width="64" height="64" rx="14" fill="#1a1a2e"/>
  <!-- espiral de libreta (3 anillos) -->
  <circle cx="20" cy="14" r="3.5" fill="none" stroke="#7c6fff" stroke-width="2.5"/>
  <circle cx="32" cy="14" r="3.5" fill="none" stroke="#7c6fff" stroke-width="2.5"/>
  <circle cx="44" cy="14" r="3.5" fill="none" stroke="#7c6fff" stroke-width="2.5"/>
  <!-- cuerpo de la libreta -->
  <rect x="12" y="17" width="40" height="34" rx="4" fill="#2a2a4a"/>
  <!-- líneas de texto -->
  <line x1="19" y1="27" x2="45" y2="27" stroke="#7c6fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="34" x2="45" y2="34" stroke="#5a5a8a" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="41" x2="36" y2="41" stroke="#5a5a8a" stroke-width="2" stroke-linecap="round"/>
</svg>